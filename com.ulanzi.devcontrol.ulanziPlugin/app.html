<!DOCTYPE html>
<!--
  Device Control Plugin – Hauptdienst (Main Service)
  UUID: com.ulanzi.devcontrol  (genau 4 Segmente = Hauptdienst)

  Diese Seite läuft dauerhaft im Hintergrund, solange die
  Ulanzi Stream Controller Software geöffnet ist.

  Aufgaben:
    - Verbindung zur Ulanzi WebSocket-Schnittstelle
    - Native Bridge (bridge.js) starten für Windows-API-Zugriff
    - Button-Events verarbeiten (run, add, clear, paramfromapp)
    - Button-Icons und -Text aktualisieren
    - Systemweite Gerätewechsel durchführen
-->
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Control – Main Service</title>
  <!-- Ulanzi SDK -->
  <script src="libs/js/constants.js"></script>
  <script src="libs/js/eventEmitter.js"></script>
  <script src="libs/js/utils.js"></script>
  <script src="libs/js/ulanzideckApi.js"></script>
  <!-- Plugin-Logik -->
  <script src="js/IconRenderer.js"></script>
  <script src="js/DeviceControl.js"></script>
  <script src="js/app.js"></script>
  <style>
    body { background: #282828; color: #e8e8e8; font-family: sans-serif;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; }
    #status { text-align: center; }
    #status h2 { font-size: 14px; margin-bottom: 8px; }
    #log { font-size: 11px; color: #888; max-height: 200px; overflow-y: auto; }
    #log p { margin: 2px 0; }
  </style>
</head>
<body>
  <div id="status">
    <h2>🎛 Device Control Plugin</h2>
    <div id="bridge-status">Native Bridge: Verbinde...</div>
    <hr style="border-color:#444;margin:8px 0">
    <div id="log"></div>
  </div>
</body>
</html>
